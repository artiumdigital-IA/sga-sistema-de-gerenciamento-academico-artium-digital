# docker-compose de PRODUCAO
# Usado pelo Coolify ou diretamente na VPS
# Variaveis sensiveis vem de .env (nunca commitar o .env real)

version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fiurj_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - fiurj_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - fiurj_net
    ports:
      - "3001:3001"
    # Healthcheck do backend -- investigacao do "Gateway Timeout intermitente"
    # (Documentos, Identidade Visual): o CMD do backend/Dockerfile roda
    # "npx prisma migrate deploy && node dist/src/main", ou seja as migrations
    # rodam ANTES do servidor comecar a escutar na porta 3001. Sem healthcheck
    # aqui, o Docker sempre reportava o container como "saudavel" (nao tem o
    # que reportar) e o Traefik mandava trafego assim que o container subia
    # (redeploy, restart por crash/OOM), mesmo antes do processo Nest estar
    # pronto pra responder -- essa janela e a causa mais provavel do erro. O
    # endpoint usado (GET /api/v1/health, publico, sem consulta a banco/redis)
    # esta em backend/src/health/. start_period da margem pra migrate deploy
    # + boot terminarem antes de contar falhas.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Labels manuais do Traefik (Coolify) pra rotear /api/v1 E /uploads pro
    # backend SEM remover o prefixo do path. O campo Domains do Coolify
    # sempre gera um middleware stripprefix, mas o Nest ja expoe tudo sob
    # /api/v1 internamente (ver main.ts) -- se o Traefik tirar o prefixo
    # antes de encaminhar, o Nest recebe a rota sem prefixo e devolve 404.
    # /uploads tambem precisa estar aqui: o Nest serve os arquivos estaticos
    # (avatar de usuario, simbolo/logo da instituicao em branding, etc.) via
    # app.useStaticAssets com prefix '/uploads' (fora do /api/v1) -- sem essa
    # rota o navegador pede http://host/uploads/... e cai no frontend (que
    # nao tem essa rota), daí o icone da marca e o avatar do usuario
    # aparecem quebrados. O campo Domains for backend no Coolify deve
    # ficar vazio, senao os roteadores entram em conflito.
    # traefik.docker.network fixa qual rede Traefik usa pra alcancar o
    # container -- sem isso o Traefik fica em duvida entre a rede interna
    # do Coolify e a rede fiurj_net do compose (o container esta nas duas)
    # e a requisicao trava sem resposta em vez de falhar rapido.
    labels:
      - traefik.enable=true
      - "traefik.http.routers.fiurj-backend-api.rule=Host(`187.77.56.182`) && (PathPrefix(`/api/v1`) || PathPrefix(`/uploads`))"
      - traefik.http.routers.fiurj-backend-api.entrypoints=http
      - traefik.http.services.fiurj-backend-api.loadbalancer.server.port=3001
      - traefik.docker.network=v10jck0yzwz1d35xxcj6akxt

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fiurj_net
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  fiurj_net:
    driver: bridge
