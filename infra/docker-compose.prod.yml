# docker-compose de PRODUCAO
# Usado pelo Coolify ou diretamente na VPS
# Variaveis sensiveis vem de .env (nunca commitar o .env real)

version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    # Limites revistos (Jul/2026) depois de confirmar as specs reais da VPS
    # via `free -h`/`nproc` no terminal do Coolify: 15GB RAM / 4 núcleos, bem
    # mais folgada do que a estimativa inicial de "~2GB" usada na 1ª versão
    # destes limites (baseada só no mínimo sugerido em docs/deploy-coolify.md).
    # `dmesg` não mostrou nenhum OOM kill e os containers do FIURJ tinham 0
    # restarts -- ou seja, falta de memória NÃO é a causa confirmada do
    # Gateway Timeout (ver achado real abaixo, no comentário do backend).
    # Os limites continuam aqui como rede de segurança contra um vazamento
    # de memória futuro, só que agora dimensionados sem risco de virarem eles
    # mesmos um gargalo.
    mem_limit: 1g
    cpus: 1.5
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fiurj_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servico "redis" REMOVIDO (Jul/2026) -- investigacao do Gateway Timeout
  # intermitente: confirmado por grep que NENHUMA linha do backend
  # (nem "redis" nem "ioredis" aparecem em src/ ou package.json) usa esse
  # servico. Ele rodava desde a Fase 0 (planejado pra cache/sessao/fila,
  # nunca chegou a ser cabeado) e ficava consumindo RAM/CPU a troco de nada
  # numa VPS pequena (~2GB, ver docs/deploy-coolify.md) dividida entre 4
  # servicos + o proprio SO + Docker + (possivelmente) o proxy edu-nginx.
  # Se algum dia for necessario (fila de jobs, cache, sessao), e so
  # readicionar o bloco (estava identico ao "postgres" acima, so trocando a
  # imagem e o volume).

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    mem_limit: 1536m
    cpus: 1.5
    environment:
      # connection_limit explicito -- sem isso o Prisma calcula sozinho
      # (num_cpus*2+1) a partir da visao de CPU do CONTAINER. Com os 4
      # núcleos reais da VPS confirmados, 10 é o valor natural (4*2+1≈9,
      # arredondado) pra 1 réplica do backend, com folga grande no
      # max_connections padrão (100) do Postgres.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=10
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL}
      # Sem isso, o V8 dimensiona o heap padrão pela memória TOTAL que o
      # container enxerga -- nessa VPS especificamente isso não chegou a ser
      # um problema confirmado (15GB reais, `dmesg` sem OOM kill, containers
      # do FIURJ com 0 restarts), mas mantido como rede de segurança barata
      # contra vazamento de memória futuro. Cap abaixo do mem_limit acima
      # (sobra ~500MB pra stack/buffers nativos/threadpool do libuv).
      NODE_OPTIONS: --max-old-space-size=1024
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - fiurj_net
    ports:
      - "3001:3001"
    # Healthcheck do backend -- investigacao do "Gateway Timeout intermitente"
    # (Documentos, Identidade Visual): o CMD do backend/Dockerfile roda
    # "npx prisma migrate deploy && node dist/src/main", ou seja as migrations
    # rodam ANTES do servidor comecar a escutar na porta 3001. Sem healthcheck
    # aqui, o Docker sempre reportava o container como "saudavel" (nao tem o
    # que reportar) e o Traefik mandava trafego assim que o container subia
    # (redeploy), mesmo antes do processo Nest estar pronto pra responder --
    # continua valendo como mitigacao pra essa janela especifica de redeploy,
    # mas a CAUSA CONFIRMADA do Gateway Timeout intermitente (Jul/2026,
    # `docker ps -a` + `dmesg` no terminal do Coolify) foi outra: o container
    # "edu-keycloak" (de OUTRO sistema que compartilha essa VPS, "eduplatform"
    # -- nao faz parte do FIURJ, que adiou Keycloak por decisao de projeto)
    # estava em loop de crash havia 4 dias, quase 7 mil reinicios (~1 a cada
    # 50s) -- cada tentativa de boot de uma app Java/Quarkus consome CPU
    # pesado por alguns segundos, e numa VPS de so 4 nucleos isso gera picos
    # de contencao de CPU que atingem TODOS os containers do host, FIURJ
    # incluido, de forma intermitente. `free -h`/`dmesg` confirmaram que
    # memoria/OOM NAO era o problema (15GB reais, sem OOM kill registrado, 0
    # restarts nos containers do FIURJ). O endpoint usado (GET /api/v1/health,
    # publico, sem consulta a banco/redis) esta em backend/src/health/.
    # start_period da margem pra migrate deploy + boot terminarem antes de
    # contar falhas.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Labels manuais do Traefik (Coolify) pra rotear /api/v1 E /uploads pro
    # backend SEM remover o prefixo do path. O campo Domains do Coolify
    # sempre gera um middleware stripprefix, mas o Nest ja expoe tudo sob
    # /api/v1 internamente (ver main.ts) -- se o Traefik tirar o prefixo
    # antes de encaminhar, o Nest recebe a rota sem prefixo e devolve 404.
    # /uploads tambem precisa estar aqui: o Nest serve os arquivos estaticos
    # (avatar de usuario, simbolo/logo da instituicao em branding, etc.) via
    # app.useStaticAssets com prefix '/uploads' (fora do /api/v1) -- sem essa
    # rota o navegador pede http://host/uploads/... e cai no frontend (que
    # nao tem essa rota), daí o icone da marca e o avatar do usuario
    # aparecem quebrados. O campo Domains for backend no Coolify deve
    # ficar vazio, senao os roteadores entram em conflito.
    # traefik.docker.network fixa qual rede Traefik usa pra alcancar o
    # container -- sem isso o Traefik fica em duvida entre a rede interna
    # do Coolify e a rede fiurj_net do compose (o container esta nas duas)
    # e a requisicao trava sem resposta em vez de falhar rapido.
    #
    # Roteador HTTPS adicionado (Jul/2026) pra suportar o dominio
    # sga.fiurj.edu.br (ver CLAUDE.md, secao HTTPS/subdominio) -- entrypoint
    # "https" + certresolver "letsencrypt" copiados exatamente dos labels que
    # o proprio Coolify gerou pro frontend (confirmado via
    # `docker inspect <container-frontend> --format '{{json .Config.Labels}}'`
    # no terminal do Coolify), pra nao adivinhar nome de resolver/entrypoint
    # errado e derrubar o Traefik. O roteador antigo (so IP, so http) foi
    # mantido em paralelo -- ambos os hosts (IP puro e dominio novo) seguem
    # funcionando durante a transicao; remover o fallback do IP e adicionar
    # redirect-to-https so depois de confirmar que nada mais depende dele
    # (app mobile em producao, etc.).
    #
    # IMPORTANTE (bug corrigido Jul/2026): o roteador HTTPS NAO pode incluir
    # o IP puro na regra de Host() -- Let's Encrypt/ACME rejeita pedido de
    # certificado pra endereco IP ("Default profile does not permit IP
    # address identifiers"), e isso fazia o Traefik falhar a emissao do
    # certificado sem parar (logs cheios de "Unable to obtain ACME
    # certificate"), o que por sua vez deixava o roteador inteiro sem TLS
    # valido. O roteador HTTP (sem TLS) continua aceitando IP normalmente.
    labels:
      - traefik.enable=true
      - "traefik.http.routers.fiurj-backend-api.rule=(Host(`187.77.56.182`) || Host(`sga.fiurj.edu.br`)) && (PathPrefix(`/api/v1`) || PathPrefix(`/uploads`))"
      - traefik.http.routers.fiurj-backend-api.entrypoints=http
      - "traefik.http.routers.fiurj-backend-api-https.rule=Host(`sga.fiurj.edu.br`) && (PathPrefix(`/api/v1`) || PathPrefix(`/uploads`))"
      - traefik.http.routers.fiurj-backend-api-https.entrypoints=https
      - traefik.http.routers.fiurj-backend-api-https.tls=true
      - traefik.http.routers.fiurj-backend-api-https.tls.certresolver=letsencrypt
      - traefik.http.services.fiurj-backend-api.loadbalancer.server.port=3001
      - traefik.docker.network=v10jck0yzwz1d35xxcj6akxt

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    mem_limit: 1g
    cpus: 1.0
    environment:
      NODE_ENV: production
      PORT: 3000
      # Mesmo raciocínio do NODE_OPTIONS do backend acima -- rede de
      # segurança contra vazamento futuro, não a causa confirmada do
      # Gateway Timeout (ver comentário no healthcheck do backend acima).
      NODE_OPTIONS: --max-old-space-size=768
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fiurj_net
    ports:
      - "3000:3000"
    # traefik.docker.network -- mesmo problema e mesma solucao ja documentados
    # no servico "backend" acima: o Coolify conecta este container em DUAS
    # redes (a rede interna do Coolify + a fiurj_net deste compose), e sem
    # essa label o Traefik nao sabe por qual rede alcancar o container --
    # confirmado via `docker inspect <container> --format
    # '{{json .NetworkSettings.Networks}}'` mostrando as duas redes, e a
    # ausencia dessa label no `docker inspect --format '{{json .Config.Labels}}'`
    # (as demais labels do Traefik pro frontend sao 100% auto-geradas pelo
    # Coolify a partir do dominio configurado -- essa e a unica adicionada
    # manualmente aqui). Sem isso, requisicoes pro dominio davam Gateway
    # Timeout (Jul/2026) mesmo com o container saudavel e respondendo
    # normalmente por dentro (`wget http://127.0.0.1:3000` funcionava).
    labels:
      - traefik.docker.network=v10jck0yzwz1d35xxcj6akxt

volumes:
  postgres_data:
  backend_uploads:

networks:
  fiurj_net:
    driver: bridge
