# docker-compose de PRODUCAO
# Usado pelo Coolify ou diretamente na VPS
# Variaveis sensiveis vem de .env (nunca commitar o .env real)

version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fiurj_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - fiurj_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - fiurj_net
    ports:
      - "3001:3001"
    # Labels manuais do Traefik (Coolify) pra rotear /api/v1 pro backend SEM
    # remover o prefixo do path. O campo Domains do Coolify sempre gera um
    # middleware stripprefix, mas o Nest ja expoe tudo sob /api/v1
    # internamente (ver main.ts) -- se o Traefik tirar o prefixo antes de
    # encaminhar, o Nest recebe a rota sem prefixo e devolve 404. Por isso
    # essas labels ficam manuais aqui, e o campo Domains for backend no
    # Coolify deve ficar vazio, senao os dois roteadores entram em conflito.
    labels:
      - traefik.enable=true
      - "traefik.http.routers.fiurj-backend-api.rule=Host(`187.77.56.182`) && PathPrefix(`/api/v1`)"
      - traefik.http.routers.fiurj-backend-api.entrypoints=http
      - traefik.http.services.fiurj-backend-api.loadbalancer.server.port=3001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - backend
    networks:
      - fiurj_net
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  fiurj_net:
    driver: bridge
