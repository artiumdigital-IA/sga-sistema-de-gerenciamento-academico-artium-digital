# Ambiente de desenvolvimento local
# Uso: docker compose up -d
# Não usar em produção — use um PostgreSQL gerenciado (Supabase, Neon, Railway, etc.)

services:
  postgres:
    image: postgres:16-alpine
    container_name: fiurj_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fiurj
      POSTGRES_PASSWORD: fiurj_dev_senha   # só para local
      POSTGRES_DB: fiurj_plataforma
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fiurj -d fiurj_plataforma']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fiurj_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

# DATABASE_URL para o backend/.env:
# postgresql://fiurj:fiurj_dev_senha@localhost:5432/fiurj_plataforma?schema=public
